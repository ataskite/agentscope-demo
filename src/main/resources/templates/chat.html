<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentScope // AI TERMINAL</title>
    <link rel="stylesheet" href="/vendor/fonts/fonts.css">
    <link rel="stylesheet" href="/vendor/css/highlight.css">
    <link rel="stylesheet" href="/styles/chat.css">
    <script src="/vendor/js/marked.min.js"></script>
    <script src="/vendor/js/highlight.min.js"></script>
</head>
<body>
    <div class="scanlines"></div>
    <div class="grid-bg"></div>
    <div class="app">
        <header class="app-header">
            <div class="header-logo"></div>
            <div class="header-title">AGENT<span class="header-scope">SCOPE</span> <span class="header-subtitle">// TERMINAL v1.0</span></div>
        </header>
        <div class="app-body">
            <!-- Left Sidebar: Agent Selector -->
            <aside class="sidebar">
                <div class="sidebar-header"><svg class="sidebar-header-icon" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="1" width="12" height="6" rx="1.5"/><rect x="2" y="9" width="12" height="6" rx="1.5"/><circle cx="5" cy="4" r="1"/><circle cx="5" cy="12" r="1"/><line x1="8" y1="4" x2="12" y2="4"/><line x1="8" y1="12" x2="12" y2="12"/></svg>Select Agent</div>
                <div class="agent-list" id="agentList">
                    <!-- Agent cards rendered dynamically by loadAgents() -->
                </div>
            </aside>

            <!-- Center: Chat Area -->
            <main class="chat-area">
                <div class="chat-header">
                    <div class="chat-header-name" id="chatHeaderName">Basic Chat</div>
                    <div class="chat-header-sep">//</div>
                    <div class="chat-header-desc" id="chatHeaderDesc">Simple conversation with AI assistant</div>
                    <div class="chat-header-spacer"></div>
                    <button class="chat-header-clear" onclick="clearSession()">CLEAR</button>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-empty" id="chatEmpty">
                        <div class="chat-empty-content">
                            <div class="chat-empty-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
                            <div class="chat-empty-text">Initialize communication sequence</div>
                        </div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <div id="fileTagArea" style="padding: 0 0 8px 0; min-height: 0;"></div>
                    <div class="chat-input-row">
                        <button class="upload-btn" id="uploadBtn" title="Upload file">+</button>
                        <input type="file" id="fileInput" accept=".docx,.pdf,.xlsx,.jpg,.jpeg,.png,.gif,.webp,.wav,.mp3,.m4a,.mp4" style="display:none">
                        <textarea class="chat-input" id="messageInput" placeholder="Enter command or message..." rows="1"></textarea>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">SEND</button>
                    </div>
                </div>
            </main>

            <!-- Right: Debug Panel -->
            <aside class="debug-panel" id="debugPanel">
                <div class="debug-header">
                    <div class="debug-title">Agent Traces</div>
                    <button class="debug-toggle" id="debugToggle" onclick="toggleDebug()" title="Toggle debug panel">▶</button>
                </div>
                <div class="debug-rounds" id="debugRounds"></div>
                <div class="debug-clear">
                    <button onclick="clearDebug()">CLEAR</button>
                </div>
            </aside>
        </div>
    </div>

    <script type="module" src="/scripts/chat.js?v=2.1"></script>
</body>
</html>
