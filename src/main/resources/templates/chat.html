<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentScope // AI TERMINAL</title>
    <link rel="stylesheet" href="/vendor/fonts/fonts.css">
    <link rel="stylesheet" href="/styles/chat.css">
    <script src="/vendor/js/marked.min.js"></script>
</head>
<body>
    <div class="scanlines"></div>
    <div class="grid-bg"></div>
    <div class="app">
        <header class="app-header">
            <div class="header-logo"></div>
            <div class="header-title">AGENT<span class="header-scope">SCOPE</span> <span class="header-subtitle">// TERMINAL v1.0</span></div>
        </header>
        <div class="app-body">
            <!-- Left Sidebar: Agent Selector + Session List -->
            <aside class="sidebar">
                <div class="sidebar-header"><div class="sidebar-header-dot"></div>Select Agent</div>
                <div class="agent-list" id="agentList">
                    <!-- Agent cards rendered dynamically by loadAgents() -->
                </div>
                <div class="sidebar-divider"></div>
                <div class="sidebar-header session-header">
                    <div class="sidebar-header-dot"></div>Sessions
                    <button class="session-new-btn" onclick="createNewSession()" title="New session">+</button>
                </div>
                <div class="session-list" id="sessionList">
                    <!-- Session items rendered dynamically -->
                </div>
                <div class="sidebar-divider"></div>
                <div class="sidebar-header">
                    <div class="sidebar-header-dot"></div>Knowledge
                    <button class="session-new-btn" onclick="document.getElementById('knowledgeFileInput').click()" title="Upload document">+</button>
                </div>
                <input type="file" id="knowledgeFileInput" accept=".pdf,.docx,.txt,.md" style="display:none" onchange="uploadToKnowledge(this)">
                <div class="knowledge-docs" id="knowledgeDocs">
                    <!-- Knowledge documents rendered dynamically -->
                </div>
            </aside>

            <!-- Center: Chat Area -->
            <main class="chat-area">
                <div class="chat-header">
                    <div class="chat-header-name" id="chatHeaderName">Basic Chat</div>
                    <div class="chat-header-sep">//</div>
                    <div class="chat-header-desc" id="chatHeaderDesc">Simple conversation with AI assistant</div>
                    <div class="chat-header-spacer"></div>
                    <button class="chat-header-clear" onclick="clearSession()">CLEAR</button>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-empty" id="chatEmpty">
                        <div class="chat-empty-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
                        <div class="chat-empty-text">Initialize communication sequence</div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <div id="fileTagArea" style="padding: 0 0 8px 0; min-height: 0;"></div>
                    <div class="chat-input-row">
                        <button class="upload-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()" title="Upload file">+</button>
                        <input type="file" id="fileInput" accept=".docx,.pdf,.xlsx,.jpg,.jpeg,.png,.gif,.webp,.wav,.mp3,.m4a,.mp4" style="display:none" onchange="handleFileSelect(this)">
                        <textarea class="chat-input" id="messageInput" placeholder="Enter command or message..." rows="1"></textarea>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">SEND</button>
                    </div>
                </div>
            </main>

            <!-- Right: Debug Panel -->
            <aside class="debug-panel" id="debugPanel">
                <div class="debug-header">
                    <div class="debug-title">Runtime</div>
                    <button class="debug-toggle" id="debugToggle" onclick="toggleDebug()" title="Toggle debug panel">▶</button>
                </div>
                <div class="debug-rounds" id="debugRounds"></div>
                <div class="debug-clear">
                    <button onclick="clearDebug()">CLEAR</button>
                </div>
            </aside>
        </div>
    </div>

    <script type="module" src="/scripts/chat.js"></script>
</body>
</html>
