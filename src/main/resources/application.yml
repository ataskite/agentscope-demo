# AgentScope Demo Application Configuration

spring:
  application:
    name: agentscope-demo
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# AgentScope Configuration
agentscope:
  # Model Configuration
  model:
    # Default model provider
    provider: dashscope
    # DashScope configuration
    dashscope:
      # API key (can be overridden by DASHSCOPE_API_KEY environment variable)
      api-key: ${DASHSCOPE_API_KEY:}
      # Model name
      model-name: qwen-plus
      # Enable streaming
      stream: true
      # Enable thinking mode
      enable-thinking: true
      # Thinking budget (tokens)
      thinking-budget: 1024

  # Memory Configuration
  memory:
    # Memory type: in-memory, mysql, redis
    type: in-memory
    # Max conversation history
    max-history: 100

  # Tool Configuration
  tools:
    # Enable built-in tools
    enabled: true

  # Session Configuration
  session:
    enabled: true
    storage-path: ${user.home}/.agentscope/demo-sessions

  # Knowledge Configuration
  knowledge:
    enabled: true
    embedding-model: text-embedding-v3
    dimensions: 1024

# Logging Configuration
logging:
  level:
    root: INFO
    io.agentscope: INFO
    com.msxf.agentscope: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
