# AgentScope Demo Application Configuration

spring:
  application:
    name: agentscope-demo
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  task:
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 100
        keep-alive: 60s
        allow-core-thread-timeout: true
      thread-name-prefix: sse-

# AgentScope Configuration
agentscope:
  # Model Configuration
  model:
    # Default model provider
    provider: dashscope
    # DashScope configuration
    dashscope:
      # API key (can be overridden by DASHSCOPE_API_KEY environment variable)
      api-key: ${DASHSCOPE_API_KEY:}
      # Model name
      model-name: qwen-plus
      # Enable streaming
      stream: true
      # Enable thinking mode
      enable-thinking: true
      # Thinking budget (tokens)
      thinking-budget: 1024

  # Memory Configuration
  memory:
    # Memory type: in-memory, mysql, redis
    type: in-memory
    # Max conversation history
    max-history: 100

  # Tool Configuration
  tools:
    # Enable built-in tools
    enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    io.agentscope: INFO
    com.msxf.agentscope: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
