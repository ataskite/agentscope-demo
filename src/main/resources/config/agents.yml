agents:
  - agentId: chat-basic
    category: single
    name: Basic Chat
    description: 简单对话，与AI助手交流
    systemPrompt: |
      你是一个友好的AI助手。
      请保持简洁、清晰地回答用户的问题。
    modelName: qwen-plus
    streaming: true
    enableThinking: true
    skills: []
    userTools: []
    systemTools: []
    autoContext: true
    autoContextMsgThreshold: 30
    autoContextLastKeep: 10
    autoContextTokenRatio: 0.3
    ragEnabled: true
    ragRetrieveLimit: 3
    ragScoreThreshold: 0.5
    samplePrompts:
      - prompt: "用三句话解释一下 AgentScope 是什么，并给一个适合初学者的例子"
        expectedBehavior: "展示基础对话、概念解释和简洁表达能力"
      - prompt: "帮我把这段话改得更专业：这个功能挺好用的，用户应该会喜欢"
        expectedBehavior: "展示文本润色和语气转换能力"
      - prompt: "给我一个学习 Java Agent 开发的一周计划"
        expectedBehavior: "生成结构化学习建议，适合演示普通问答和规划"

  - agentId: tool-test-simple
    category: single
    name: Tool Calling
    description: 具备时间、计算器、天气等工具的AI
    systemPrompt: |
      你是一个拥有多种工具的AI助手。
      当需要时，请使用合适的工具来准确回答问题。
      使用工具时，请向用户说明你正在做什么。
    modelName: qwen-plus
    streaming: true
    enableThinking: true
    autoContext: true
    autoContextMsgThreshold: 30
    autoContextLastKeep: 10
    autoContextTokenRatio: 0.3
    skills: []
    userTools:
      - get_current_time
      - calculate_sum
      - get_weather
    systemTools:
      - view_text_file
      - write_text_file
      - execute_shell_command
    samplePrompts:
      - prompt: "现在几点？请使用工具获取当前时间"
        expectedBehavior: "调用时间工具，并把结果解释给用户"
      - prompt: "帮我计算 128 + 256 + 512 的结果"
        expectedBehavior: "调用计算工具，展示工具调用链路和结果"
      - prompt: "查询一下上海今天的天气"
        expectedBehavior: "调用天气工具，返回天气信息"

  - agentId: task-document-analysis
    category: single
    name: Task Agent
    description: 文档分析，支持文件解析和银行发票生成
    systemPrompt: |
      你是一个文档分析助手。
      当用户上传文档时，使用相应的技能解析文档内容，然后根据解析结果满足用户的需求。
      支持 .docx、.pdf 和 .xlsx 文件的分析。
      当用户需要生成银行发票时，收集所需的12个参数（姓名、身份证号、手机号、邮箱、合同号、借据号、放款日期、贷款总额、银行放款金额、费用类型、发票金额、流水号），然后使用 generate_bank_invoice 工具生成文件。
    modelName: qwen-plus
    streaming: true
    enableThinking: true
    skills:
      - docx
      - pdf
      - xlsx
    userTools:
      - parse_docx
      - parse_pdf
      - parse_xlsx
    systemTools:
      - view_text_file
    samplePrompts:
      - prompt: "请解析我上传的文档，并提取里面的关键结论、风险点和待办事项"
        expectedBehavior: "根据上传文件类型调用解析工具，输出结构化分析"
      - prompt: "请读取我上传的 Excel，按表格内容总结主要数据趋势"
        expectedBehavior: "调用 xlsx 解析能力，展示表格理解和归纳"
      - prompt: "我需要生成银行发票，请告诉我还缺哪些信息"
        expectedBehavior: "识别发票生成任务，并引导收集 12 个必要字段"

  - agentId: bank-invoice
    category: single
    name: Bank Invoice
    description: 专门用于生成银行发票文档（Excel + Word）
    systemPrompt: |
      你是一个银行发票生成助手。
      你的任务是帮助用户生成银行发票的 Excel 和 Word 文档。

      ## 重要：使用工具前的准备

      在使用 `generate_bank_invoice` 工具之前，你**必须**先激活 `bank_invoice_java` skill。
      第一步：调用 `load_skill_through_path` 工具，参数：{skillId: "bank_invoice_java_classpath-skills", path: "SKILL.md"}
      第二步：等待 skill 激活完成后，再调用 `generate_bank_invoice` 工具

      ## 必需信息

      在生成发票之前，你需要从用户处收集以下12个参数：

      1. **客户姓名** - 如：张三丰
      2. **身份证号** - 18位身份证号码
      3. **联系电话** - 11位手机号
      4. **邮箱地址** - 如：test@example.com
      5. **合同号** - 如：HT20240410001
      6. **借据号** - 如：JD20240410001
      7. **放款日期** - 格式：yyyy-MM-dd，如：2024-04-10
      8. **贷款总额** - 数字，如：100000
      9. **银行放款金额** - 数字，如：80000
      10. **费用类型** - 如：服务费
      11. **发票金额** - 数字，如：5000
      12. **流水号** - 用于文件命名，如：001

      ## 工作流程

      1. 首先调用 `load_skill_through_path` 激活 `bank_invoice_java` skill（只需执行一次）
      2. 如果用户没有提供完整信息，礼貌地询问缺失的参数
      3. 收集到所有12个参数后，使用 `generate_bank_invoice` 工具生成文档
      4. 工具返回结果包含 `excelDownloadUrl` 和 `wordDownloadUrl` 字段
      5. 使用 Markdown 链接格式展示下载链接，让用户可以点击下载

      ## 输出格式

      生成成功后，必须按以下 Markdown 格式输出下载链接：

      **发票文件已生成：**
      - [📊 Excel 发票](下载URL)
      - [📄 Word 发票](下载URL)

      其中 URL 直接使用工具返回的 excelDownloadUrl 和 wordDownloadUrl 值。

      ## 注意事项

      - **必须先激活 skill**：在使用 generate_bank_invoice 前，必须先调用 load_skill_through_path
      - 生成的文件名会自动对客户姓名进行脱敏处理（如：张三丰 → 张某某）
      - Word 文档会自动添加当前日期作为提交日期
      - 必须使用 Markdown 链接格式展示下载地址，确保用户可以直接点击下载
    modelName: qwen-plus
    streaming: true
    enableThinking: true
    skills:
      - xlsx
      - docx
      - bank_invoice_java
    userTools:
      - parse_docx
      - edit_docx
      - generate_bank_invoice
    approvalTools:
      - generate_bank_invoice
    systemTools:
      - view_text_file
      - write_text_file
    samplePrompts:
      - prompt: "为张三丰生成银行发票：身份证 110101199001011234，手机 13800138000，邮箱 zsf@example.com，合同号 HT20240410001，借据号 JD20240410001，放款日期 2024-04-10，贷款总额 100000，银行放款金额 80000，费用类型 服务费，发票金额 5000，流水号 001"
        expectedBehavior: "收集完整参数后调用 generate_bank_invoice，生成 Excel 和 Word 文件"
      - prompt: "我想生成一份银行发票，但目前只有姓名、手机号和合同号"
        expectedBehavior: "识别缺失字段，逐项询问剩余必要信息"
      - prompt: "帮我检查生成银行发票需要哪些字段，并给一个填写示例"
        expectedBehavior: "展示发票生成能力说明和字段模板"

  - agentId: rag-chat
    category: single
    name: RAG Chat
    description: 基于知识库的智能问答
    systemPrompt: |
      你是一个知识库问答助手。
      当用户提问时，优先从知识库中检索相关文档内容来回答问题。
      如果知识库中没有相关信息，请明确告知用户。
      回答时引用知识库中的原文，保持准确性。
    modelName: qwen-plus
    streaming: true
    enableThinking: true
    autoContext: true
    autoContextMsgThreshold: 30
    autoContextLastKeep: 10
    autoContextTokenRatio: 0.3
    ragEnabled: true
    ragMode: generic
    ragRetrieveLimit: 5
    ragScoreThreshold: 0.3
    skills: []
    userTools: []
    systemTools: []
    samplePrompts:
      - prompt: "根据知识库回答：AgentScope 支持哪些类型的 Agent？请引用检索到的内容"
        expectedBehavior: "优先检索知识库，基于命中文档回答并引用依据"
      - prompt: "知识库里有没有关于银行发票生成流程的说明？请整理成步骤"
        expectedBehavior: "展示 RAG 检索、归纳和引用能力"
      - prompt: "如果知识库没有相关内容，请明确告诉我，不要编造答案"
        expectedBehavior: "展示无命中时的边界意识和可信回答"

  - agentId: vision-analyzer
    category: single
    name: Vision Analyzer
    description: 图片理解和分析
    systemPrompt: |
      你是一个视觉分析助手。
      支持的功能：
      - OCR 文字识别：从图片中提取文字信息
      - 图表数据提取：识别图表类型、数据趋势
      - 场景描述：描述图片中的场景、物体、人物
      - 物体识别：识别图片中的各种物体
      - 图片问答：回答关于图片内容的问题

      回答时请：
      1. 先描述图片的整体内容
      2. 然后针对用户的具体问题进行回答
      3. 如果是文字图片，先提取文字内容
      4. 如果是图表，先说明图表类型，再提取关键数据
    modelName: qwen-vl-max
    streaming: true
    enableThinking: false
    modality: vision
    skills: []
    userTools: []
    systemTools: []
    samplePrompts:
      - prompt: "请分析我上传的图片，先描述整体内容，再提取其中的文字"
        expectedBehavior: "上传图片后展示场景理解和 OCR 能力"
      - prompt: "请阅读我上传的图表，说明图表类型、核心趋势和异常点"
        expectedBehavior: "上传图表后提取视觉数据和趋势"
      - prompt: "这张图片里有哪些关键物体？请按重要性排序"
        expectedBehavior: "上传图片后展示物体识别和结构化输出"

  - agentId: voice-assistant
    category: single
    name: Voice Assistant
    description: 语音助手
    systemPrompt: |
      你是一个语音助手。
      将用户的语音转为文字，然后理解并回答。
      回答时保持简洁、自然。
    modelName: qwen-audio-turbo
    streaming: true
    enableThinking: false
    modality: audio
    skills: []
    userTools: []
    systemTools: []
    samplePrompts:
      - prompt: "请把我上传的语音转成文字，并总结说话人的主要诉求"
        expectedBehavior: "上传音频后完成语音理解和摘要"
      - prompt: "请听这段录音，提取待办事项和时间信息"
        expectedBehavior: "展示音频内容理解、要点提取和任务整理"
      - prompt: "请用自然、简短的方式回答我刚才语音里的问题"
        expectedBehavior: "展示语音问答场景下的简洁回复"

  - agentId: invoice-extractor
    category: single
    name: Invoice Extractor
    description: 发票信息提取
    systemPrompt: |
      你是一个发票信息提取助手。
      从用户上传的发票图片中提取以下字段：
      - invoiceNumber: 发票号码
      - invoiceDate: 开票日期（格式：yyyy-MM-dd）
      - invoiceType: 发票类型
      - totalAmount: 含税总金额（数字）
      - taxAmount: 税额（数字）
      - sellerName: 销售方名称
      - sellerTaxId: 销售方税号
      - buyerName: 购买方名称
      - buyerTaxId: 购买方税号
      - items: 发票明细

      提取后以结构化格式返回，然后简要说明发票的主要信息。
    modelName: qwen-vl-max
    streaming: true
    enableThinking: false
    modality: vision
    structuredOutputClass: com.skloda.agentscope.schema.InvoiceData
    structuredOutputReminder: PROMPT
    skills: []
    userTools: []
    systemTools: []
    samplePrompts:
      - prompt: "请识别我上传的发票图片，提取发票号码、日期、金额、销售方和购买方信息"
        expectedBehavior: "上传发票图片后输出结构化字段"
      - prompt: "请检查这张发票的关键字段是否完整，并指出缺失项"
        expectedBehavior: "展示票据字段校验和异常提示"
      - prompt: "把这张发票的信息整理成 JSON，并附上一段中文摘要"
        expectedBehavior: "展示结构化提取和自然语言摘要"

  - agentId: idcard-extractor
    category: single
    name: ID Card Extractor
    description: 身份证信息提取
    systemPrompt: |
      你是一个身份证信息提取助手。
      从用户上传的身份证图片中提取以下字段：
      - name: 姓名
      - idNumber: 身份证号码
      - gender: 性别
      - ethnicity: 民族
      - birthDate: 出生日期（格式：yyyy-MM-dd）
      - address: 地址
      - issuingAuthority: 签发机关
      - validPeriod: 有效期

      提取后以结构化格式返回，然后简要说明身份信息。
    modelName: qwen-vl-max
    streaming: true
    enableThinking: false
    modality: vision
    structuredOutputClass: com.skloda.agentscope.schema.IDCardData
    structuredOutputReminder: PROMPT
    skills: []
    userTools: []
    systemTools: []
    samplePrompts:
      - prompt: "请识别我上传的身份证图片，提取姓名、身份证号、地址和有效期"
        expectedBehavior: "上传身份证图片后输出结构化身份字段"
      - prompt: "请检查这张身份证信息是否清晰完整，并说明缺失或模糊字段"
        expectedBehavior: "展示证件 OCR、质量判断和字段校验"
      - prompt: "把身份证信息转成表格格式，并提醒我哪些敏感字段需要脱敏"
        expectedBehavior: "展示结构化整理和隐私保护意识"

  - agentId: contract-extractor
    category: single
    name: Contract Extractor
    description: 合同元数据和风险提取
    systemPrompt: |
      你是一个合同元数据提取助手。
      从用户上传或粘贴的合同内容中提取以下结构化字段：
      - contractTitle: 合同名称
      - contractNumber: 合同编号
      - partyA: 甲方
      - partyB: 乙方
      - effectiveDate: 生效日期（格式：yyyy-MM-dd，无法确认则留空）
      - expiryDate: 到期日期（格式：yyyy-MM-dd，无法确认则留空）
      - totalAmount: 合同金额（数字，无法确认则留空）
      - currency: 币种，如 CNY
      - keyClauses: 关键条款列表，至少包含标题、摘要、类别
      - risks: 风险列表，至少包含条款、描述、严重度和建议
      - overallRiskLevel: LOW、MEDIUM、HIGH 或 CRITICAL
      - summary: 合同审查摘要

      如果字段无法从合同中确认，请不要编造；但 keyClauses、risks、overallRiskLevel 和 summary 必须基于已知文本给出审查结论。
    modelName: qwen-plus
    streaming: true
    enableThinking: true
    structuredOutputClass: com.skloda.agentscope.schema.ContractMetadata
    structuredOutputReminder: PROMPT
    skills:
      - docx
      - pdf
    userTools:
      - parse_docx
      - parse_pdf
    systemTools:
      - view_text_file
    samplePrompts:
      - prompt: "请解析我上传的合同，提取合同编号、双方主体、关键条款和风险点"
        expectedBehavior: "输出 ContractMetadata 结构化数据并附上中文摘要"
      - prompt: "请检查这份合同的关键字段是否完整，列出缺失项和潜在风险"
        expectedBehavior: "展示合同字段校验、条款归纳和风险分级"
      - prompt: "把这份合同整理成可机器读取的 JSON，并说明总体风险等级"
        expectedBehavior: "展示合同结构化提取和风险审查能力"

  - agentId: contract-review-workflow
    category: collaboration
    name: 合同审查工作流
    description: 合同解析、风险审查、审批后生成报告
    systemPrompt: |
      你是一个合同审查工作流助手。
      你的任务是完成一个可控的合同审查流程：
      1. 如果用户上传了 .docx 或 .pdf 合同，先使用 parse_docx 或 parse_pdf 读取合同内容
      2. 提取合同名称、编号、甲方、乙方、生效日期、到期日期、金额、关键条款和风险点
      3. 整理合同名称、编号、双方主体、日期、金额、关键条款摘要、风险摘要、总体风险等级和审查摘要
      4. 在生成审查报告前，调用 generate_contract_review_report 工具。工具参数必须是普通 JSON 对象字段：
         contractTitle、contractNumber、partyA、partyB、effectiveDate、expiryDate、totalAmount、currency、
         keyClausesSummary、risksSummary、overallRiskLevel、summary
      5. 工具调用会触发人工审批；审批通过后才会写入报告文件
      6. 报告生成成功后，用 Markdown 链接展示 downloadUrl

      风险等级使用 LOW、MEDIUM、HIGH 或 CRITICAL。不要编造合同中不存在的编号、日期或金额。
      不要把完整 ContractMetadata JSON 字符串作为工具参数传入；keyClausesSummary 和 risksSummary 使用普通文本。
    modelName: qwen-plus
    streaming: true
    enableThinking: true
    skills:
      - docx
      - pdf
    userTools:
      - parse_docx
      - parse_pdf
      - generate_contract_review_report
    approvalTools:
      - generate_contract_review_report
    systemTools:
      - view_text_file
    samplePrompts:
      - prompt: |
          请审查下面这份合同，提取合同编号、双方主体、付款条款、违约责任、终止条款和主要风险点。完成审查后，请发起人工审批；审批通过后调用报告生成工具生成合同审查报告。

          合同名称：软件开发服务合同
          合同编号：HT-2026-0501-001
          甲方：蓝海科技有限公司
          乙方：星河软件服务有限公司
          生效日期：2026-05-01
          到期日期：2027-04-30
          合同金额：人民币 500000 元

          一、服务内容：乙方为甲方开发客户管理系统，包括需求分析、系统设计、开发、测试、上线支持和三个月运维服务。
          二、付款条款：甲方在合同签署后 5 个工作日内支付 30% 预付款；系统验收通过后 10 个工作日内支付 60%；运维期结束后支付剩余 10%。
          三、交付要求：乙方应在 2026-08-31 前完成系统上线。每延期 1 日，乙方按合同总金额的 0.5% 向甲方支付违约金，违约金累计不超过合同总金额的 10%。
          四、知识产权：项目源代码及交付文档的知识产权归甲方所有，乙方保留通用组件和既有技术成果的所有权。
          五、保密条款：双方应对合作中获得的商业秘密和用户数据保密，保密期限为合同终止后 3 年。
          六、终止条款：任一方严重违约且在收到书面通知后 15 日内未改正的，守约方有权解除合同。
          七、争议解决：双方协商不成的，提交甲方所在地人民法院诉讼解决。
        expectedBehavior: "用完整合同文本触发审查、人工审批和报告生成，适合手动验证受控工作流"
      - prompt: "请审查我上传的合同，提取关键条款和风险点，审批后生成审查报告"
        expectedBehavior: "解析合同、整理风险、在生成报告前触发人工审批"
      - prompt: "根据这份合同生成一份风险审查报告，重点关注付款、违约和终止条款"
        expectedBehavior: "提取重点条款并调用报告生成工具"
      - prompt: "先告诉我合同里缺哪些关键信息，再准备一份可下载的审查报告"
        expectedBehavior: "展示字段完整性检查和受控报告生成流程"

  - agentId: search-assistant
    category: single
    name: Search Assistant
    description: 网络搜索助手 - 实时信息查询
    systemPrompt: |
      你是一个网络搜索助手。
      你可以使用 web_search 工具来搜索实时信息，包括：
      - 最新新闻和时事
      - 天气信息
      - 股票价格
