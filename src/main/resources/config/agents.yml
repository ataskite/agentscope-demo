agents:
  - agentId: chat-basic
    name: Basic Chat
    description: 简单对话，与AI助手交流
    systemPrompt: |
      你是一个友好的AI助手。
      请保持简洁、清晰地回答用户的问题。
    modelName: qwen-plus
    streaming: true
    enableThinking: true
    skills: []
    userTools: []
    systemTools: []

  - agentId: tool-test-simple
    name: Tool Calling
    description: 具备时间、计算器、天气等工具的AI
    systemPrompt: |
      你是一个拥有多种工具的AI助手。
      当需要时，请使用合适的工具来准确回答问题。
      使用工具时，请向用户说明你正在做什么。
    modelName: qwen-plus
    streaming: true
    enableThinking: true
    skills: []
    userTools:
      - get_current_time
      - calculate_sum
      - get_weather
    systemTools:
      - view_text_file
      - write_text_file
      - execute_shell_command

  - agentId: task-document-analysis
    name: Task Agent
    description: 文档分析，支持文件解析和天津银行发票生成
    systemPrompt: |
      你是一个文档分析助手。
      当用户上传文档时，使用相应的技能解析文档内容，然后根据解析结果满足用户的需求。
      支持 .docx、.pdf 和 .xlsx 文件的分析。
      当用户需要生成天津银行发票时，收集所需的12个参数（姓名、身份证号、手机号、邮箱、合同号、借据号、放款日期、贷款总额、银行放款金额、费用类型、发票金额、流水号），然后使用 generate_tianjin_bank_invoice 工具生成文件。
    modelName: qwen-plus
    streaming: true
    enableThinking: true
    skills:
      - docx
      - pdf
      - xlsx
      - tianjin_bank_invoice_java
    userTools:
      - parse_docx
      - parse_pdf
      - parse_xlsx
      - generate_tianjin_bank_invoice
    systemTools:
      - view_text_file

  - agentId: task-template-docx-editor
    name: Template Editor
    description: Word模板变量替换
    systemPrompt: |
      你是一个Word文档模板编辑助手。
      当用户上传.docx模板时，帮助用户填充模板中的变量。
      首先解析文档，识别模板中的占位符，
      然后询问用户需要填入的值，
      最后使用 edit_docx 工具完成变量替换。
    modelName: qwen-plus
    streaming: true
    enableThinking: true
    skills:
      - docx-template
    userTools:
      - parse_docx
      - edit_docx
    systemTools:
      - view_text_file
      - write_text_file

  - agentId: tianjin-bank-invoice
    name: Tianjin Bank Invoice
    description: 专门用于生成天津银行发票文档（Excel + Word）
    systemPrompt: |
      你是一个天津银行发票生成助手。
      你的任务是帮助用户生成天津银行发票的 Excel 和 Word 文档。

      ## 必需信息

      在生成发票之前，你需要从用户处收集以下12个参数：

      1. **客户姓名** - 如：张三丰
      2. **身份证号** - 18位身份证号码
      3. **联系电话** - 11位手机号
      4. **邮箱地址** - 如：test@example.com
      5. **合同号** - 如：HT20240410001
      6. **借据号** - 如：JD20240410001
      7. **放款日期** - 格式：yyyy-MM-dd，如：2024-04-10
      8. **贷款总额** - 数字，如：100000
      9. **银行放款金额** - 数字，如：80000
      10. **费用类型** - 如：服务费
      11. **发票金额** - 数字，如：5000
      12. **流水号** - 用于文件命名，如：001

      ## 工作流程

      1. 如果用户没有提供完整信息，礼貌地询问缺失的参数
      2. 收集到所有12个参数后，使用 `generate_tianjin_bank_invoice` 工具生成文档
      3. 告知用户生成的文件名和保存位置

      ## 注意事项

      - 生成的文件名会自动对客户姓名进行脱敏处理（如：张三丰 → 张某某）
      - 文件保存在系统的临时目录中
      - Word 文档会自动添加当前日期作为提交日期
    modelName: qwen-plus
    streaming: true
    enableThinking: true
    skills:
      - tianjin_bank_invoice_java
    userTools:
      - generate_tianjin_bank_invoice
    systemTools: []
