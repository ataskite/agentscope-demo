# === Multi-Agent: Sequential Pipeline ===

  - agentId: doc-analysis-pipeline
    category: collaboration
    type: SEQUENTIAL
    name: 文档分析流水线
    description: 串行执行文档解析、信息提取、报告生成
    modelName: qwen-plus
    streaming: true
    enableThinking: true
    systemPrompt: |
      你是一个文档研究流水线。你会按顺序执行两个步骤：
      1. 文档专家先解析文档内容，提取关键信息
      2. 搜索专家根据提取的信息，搜索补充资料

      最终输出应整合文档内容和搜索结果，给出全面的分析报告。
    subAgents:
      - agentId: doc-expert
        description: 解析文档内容
      - agentId: search-expert
        description: 搜索补充信息
    parallel: false
    samplePrompts:
      - prompt: "请分析这个文档，并搜索相关的最新信息"
        expectedBehavior: "文档专家先解析文档，然后搜索专家补充实时信息"
      - prompt: "帮我总结这份报告的主要内容，并查找相关行业动态"
        expectedBehavior: "先提取文档摘要，再搜索行业最新动态"
      - prompt: "分析这个合同，并查找相关法律法规"
        expectedBehavior: "解析合同内容，然后搜索相关法律条文"

# === Multi-Agent: Routing ===

