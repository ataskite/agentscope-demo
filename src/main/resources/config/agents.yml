# === Multi-Agent: Sequential Pipeline ===

  - agentId: doc-analysis-pipeline
    type: SEQUENTIAL
    name: 文档分析流水线
    description: 串行执行文档解析、信息提取、报告生成
    modelName: qwen-plus
    streaming: true
    enableThinking: true
    subAgents:
      - agentId: doc-expert
        description: 解析文档内容
      - agentId: search-expert
        description: 搜索补充信息
    parallel: false
    samplePrompts:
      - prompt: "请分析这个文档，并搜索相关的最新信息"
        expectedBehavior: "文档专家先解析文档，然后搜索专家补充实时信息"
      - prompt: "帮我总结这份报告的主要内容，并查找相关行业动态"
        expectedBehavior: "先提取文档摘要，再搜索行业最新动态"
      - prompt: "分析这个合同，并查找相关法律法规"
        expectedBehavior: "解析合同内容，然后搜索相关法律条文"

# === Multi-Agent: Routing ===

  - agentId: smart-router
    type: ROUTING
    name: 智能路由器
    description: 根据用户问题自动分发到专家 Agent
    modelName: qwen-plus
    streaming: true
    enableThinking: true
    subAgents:
      - agentId: doc-expert
        description: 文档分析专家，处理文档解析、分析、提取相关问题
      - agentId: search-expert
        description: 搜索专家，获取实时网络信息
      - agentId: vision-expert
        description: 视觉专家，处理图片理解和 OCR
      - agentId: sales-expert
        description: 销售专家，处理产品咨询和报价
    parallel: false
    samplePrompts:
      - prompt: "请分析我上传的合同，提取关键条款和风险点"
        expectedBehavior: "自动路由到文档专家处理文档分析问题"
      - prompt: "帮我搜索今天 AgentScope 相关的最新资讯"
        expectedBehavior: "自动路由到搜索专家获取实时信息"
      - prompt: "我想咨询企业版价格和购买建议"
        expectedBehavior: "自动路由到销售专家处理产品咨询"
      - prompt: "请识别我上传图片中的文字和主要内容"
        expectedBehavior: "自动路由到视觉专家处理图片理解"

# === Multi-Agent: Handoffs ===

  - agentId: customer-service
    type: HANDOFFS
    name: 智能客服
    description: 支持智能体交接的客服系统
    modelName: qwen-plus
    streaming: true
    enableThinking: true
    subAgents:
      - agentId: support-agent
        description: 一般客服
      - agentId: sales-agent
        description: 销售顾问
      - agentId: complaint-agent
        description: 投诉处理
    handoffTriggers:
      - type: INTENT
        keywords: ["转销售", "购买", "价格", "报价"]
        target: sales-agent
      - type: INTENT
        keywords: ["投诉", "不满"]
        target: complaint-agent
      - type: EXPLICIT
        keywords: ["转人工", "客服"]
        target: support-agent
    samplePrompts:
      - prompt: "你好，我想咨询一下产品价格"
        expectedBehavior: "自动切换到销售顾问，提供产品报价信息"
      - prompt: "我对你们的服务很不满意，要投诉"
        expectedBehavior: "自动切换到投诉处理专员，提供解决方案"
      - prompt: "请问你们的营业时间是什么时候？"
        expectedBehavior: "由一般客服回答常见问题"
      - prompt: "转人工客服"
        expectedBehavior: "显式切换到人工客服"
